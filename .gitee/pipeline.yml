name: cj-memo CI

trigger:
  push:
    branches:
      - master
  manual: true

stages:
  - name: build-and-test
    displayName: 编译与单元测试
    steps:
      - step: checkout@self
        displayName: 检出代码

      - step: shell@1.1.0
        displayName: 检查仓颉 SDK
        script:
          - |
            if ! command -v cjc >/dev/null 2>&1; then
              echo "[FAIL] runner 没有 cjc，需要预装仓颉 SDK"
              exit 1
            fi
            cjc --version

      - step: shell@1.1.0
        displayName: 编译
        script:
          - cjpm build

      - step: shell@1.1.0
        displayName: 单元测试
        script:
          - cjpm test 2>&1 | tee test_output.txt

      - step: shell@1.1.0
        displayName: 校验结果
        script:
          - |
            if grep -q "PASSED: 19" test_output.txt && ! grep -q "FAILED: [1-9]" test_output.txt; then
              echo "PASS"
            else
              echo "FAIL"
              tail -30 test_output.txt
              exit 1
            fi