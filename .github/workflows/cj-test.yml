name: cj-memo CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  cj-unit-tests:
    name: 仓颉编译与单元测试
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 社区维护的 setup-cangjie action，自动下载 / 解压 / 配置 PATH
      # STS 通道提供 1.1.3，与项目 cjpm.toml 中的 cjc-version 一致
      # components: stdx 让项目能 import stdx.* 包
      - name: 安装仓颉 SDK 1.1.3 STS + stdx
        uses: Zxilly/setup-cangjie@v3
        with:
          channel: sts
          version: 1.1.3
          cjv-version: latest
          components: stdx

      - name: 验证工具链
        run: |
          echo "cjc: $(cjc --version 2>&1 | head -1)"
          echo "cjpm: $(cjpm --version 2>&1 | head -1)"

      # CI 环境是 Linux x86_64，而 cjpm.toml 锁定了 Windows mingw32 target，
      # 这里运行时覆盖为 Linux native target，让 cjpm 在 Ubuntu runner 上能编译。
      - name: 编译项目（Linux target）
        run: |
          cjpm build --target x86_64-linux-gnu 2>&1 | tee build_output.txt

      - name: 运行单元测试
        run: |
          set -o pipefail
          cjpm test --target x86_64-linux-gnu 2>&1 | tee test_output.txt

      - name: 解析测试结果
        if: always()
        run: |
          echo "===== BUILD OUTPUT ====="
          tail -30 build_output.txt || true
          echo "===== TEST OUTPUT ====="
          tail -50 test_output.txt || true

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cj-test-report
          path: |
            build_output.txt
            test_output.txt
          retention-days: 30