name: cj-memo CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  cj-unit-tests:
    name: 仓颉编译与单元测试
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装仓颉 SDK 1.1.0 STS + stdx
        id: setup-cj
        continue-on-error: true
        uses: Zxilly/setup-cangjie@v3
        with:
          channel: sts
          version: 1.1.0
          cjv-version: latest
          components: stdx

      - name: 调试 setup-cangjie 输出
        if: always()
        run: |
          echo "===== setup-cj outputs ====="
          echo "Status: ${{ steps.setup-cj.outcome }}"
          echo "===== 环境变量中的仓颉路径 ====="
          env | grep -i -E "cangjie|STDX|CANGJIE" || echo "no env vars"

      - name: 手动安装 SDK（如果 setup-cangjie 失败）
        if: steps.setup-cj.outcome != 'success'
        run: |
          set -e
          echo "===== fallback: 手动下载仓颉 SDK 1.1.0 ====="
          wget -q "https://cangjie-lang.cn/v1/files/auth/downLoad?nsId=142267&fileName=cangjie-sdk-linux-x64-1.1.0.tar.gz&objectKey=69e9d37021f5a8178d6fd216" -O cangjie-sdk.tar.gz
          ls -lh cangjie-sdk.tar.gz
          tar -xzf cangjie-sdk.tar.gz
          ls -la
          mv cangjie cangjie-sdk
          echo "CANGJIE_HOME=$(pwd)/cangjie-sdk" >> $GITHUB_ENV
          echo "$(pwd)/cangjie-sdk/bin" >> $GITHUB_PATH

          echo "===== 下载 stdx 1.1.0.1 ====="
          wget -q "https://gitcode.com/Cangjie/cangjie_stdx/releases/download/v1.1.0.1/cangjie-stdx-linux-x64-1.1.0.1.zip" -O stdx.zip
          unzip -q stdx.zip
          ls -la
          # stdx 解压后是 linux_x86_64_cjnative 这样的目录
          STDX_DIR=$(find . -maxdepth 1 -type d -name "linux_*" | head -1)
          echo "STDX_DIR=$STDX_DIR"
          echo "STDX_PATH=$(pwd)/$STDX_DIR" >> $GITHUB_ENV

          cjc --version
          cjpm --version

      - name: 验证工具链
        run: |
          echo "cjc: $(cjc --version 2>&1 | head -1)"
          echo "cjpm: $(cjpm --version 2>&1 | head -1)"

      - name: 生成 Linux 版 cjpm.toml
        run: |
          cat > cjpm.toml <<'EOF'
          [package]
          cjc-version = "1.1.0"
          name = "cj_memo"
          version = "0.1.0"
          description = "Cangjie memo service: CRUD + points/levels + reminders, JSON-file storage."
          output-type = "executable"

          [profile.build]
          compile-option = "-g"

          [target.x86_64-unknown-linux-gnu]
            [target.x86_64-unknown-linux-gnu.bin-dependencies]
              path-option = ["${STDX_PATH}/dynamic/stdx"]
          EOF
          echo "===== cjpm.toml ====="
          cat cjpm.toml
          echo "STDX_PATH=$STDX_PATH"

      - name: 编译项目
        run: |
          cjpm build 2>&1 | tee build_output.txt

      - name: 运行单元测试
        run: |
          set -o pipefail
          cjpm test 2>&1 | tee test_output.txt

      - name: 解析测试结果
        if: always()
        run: |
          echo "===== BUILD TAIL ====="
          tail -30 build_output.txt || true
          echo "===== TEST TAIL ====="
          tail -50 test_output.txt || true

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cj-test-report
          path: |
            build_output.txt
            test_output.txt
          retention-days: 30