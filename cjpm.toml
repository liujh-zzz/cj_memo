[package]
cjc-version = "1.1.3"
name = "cj_memo"
version = "0.1.0"
description = "Cangjie memo service: CRUD + points/levels + reminders, JSON-file storage."
output-type = "executable"

[profile.build]
compile-option = "-g"

[target.x86_64-w64-mingw32]
  [target.x86_64-w64-mingw32.bin-dependencies]
    path-option = ["C:/cangjie-stdx/windows_x86_64_cjnative/dynamic/stdx"]
